<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#4f46e5">
<title>SMP — Service Management Platform</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app"></div>

<div id="device-frame" class="device-frame hidden">
  <div class="device-frame__title">
    <span class="brand-mark">SMP</span>
    <span class="brand-name">Service Management Platform</span>
  </div>
  <div class="device-frame__phones">
    <div class="device-slot">
      <div class="device-slot__label">
        <span class="badge badge--cust">CUSTOMER</span>
        <span id="cust-screen-name">Trang chủ</span>
      </div>
      <div class="phone" data-mode="customer">
        <div class="phone__notch"></div>
        <div class="phone__screen" id="cust-screen"></div>
        <div class="phone__tabbar" id="cust-tabbar"></div>
      </div>
      <div class="device-slot__nav" id="cust-nav"></div>
    </div>

    <div class="device-slot">
      <div class="device-slot__label">
        <span class="badge badge--tech">TECHNICIAN</span>
        <span id="tech-screen-name">Trang chủ</span>
      </div>
      <div class="phone" data-mode="technician">
        <div class="phone__notch"></div>
        <div class="phone__screen" id="tech-screen"></div>
        <div class="phone__tabbar" id="tech-tabbar"></div>
      </div>
      <div class="device-slot__nav" id="tech-nav"></div>
    </div>
  </div>
  <div class="device-frame__footer">
    <a href="?mode=customer">Mở chế độ Khách →</a>
    <span class="dot">·</span>
    <a href="?mode=technician">Mở chế độ Thợ →</a>
  </div>
</div>

<div id="mobile-app" class="mobile-app hidden">
  <div class="mobile-app__screen" id="mobile-screen"></div>
  <div class="mobile-app__tabbar" id="mobile-tabbar"></div>
</div>

<script src="screens.js"></script>
<script src="screens-v3.5.js"></script>
<script src="app.js"></script>
</body>
</html>
